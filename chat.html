<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Chat - AniChan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">
    <nav class="bg-black border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-3xl font-bold text-red-500">AniChan</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold mb-8">Global Chat</h1>
        <div class="bg-gray-900 rounded-3xl h-[600px] flex flex-col">
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4">
                <!-- Messages populated by realtime -->
            </div>
            <div class="p-4 border-t border-gray-700">
                <input id="chat-input" type="text" placeholder="Type a message..." 
                       class="w-full bg-gray-800 px-6 py-4 rounded-2xl focus:outline-none">
            </div>
        </div>
    </main>
    <script src="assets/js/main.js"></script>
</body>
</html>
